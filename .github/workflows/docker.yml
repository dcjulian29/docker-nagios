---
name: Nagios Docker Image

'on':
  push:
    paths:
      - Dockerfile
      - VERSION
      - VERSION_NRPE
      - VERSION_PLUGIN

  pull_request:
    paths:
      - Dockerfile
      - VERSION
      - VERSION_NRPE
      - VERSION_PLUGIN

jobs:
  build:
    if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Grab the Nagios version to use.
        id: v1
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Grab the NRPE version to use.
        id: v2
        run: echo "version=$(cat VERSION_NRPE)" >> $GITHUB_OUTPUT

      - name: Grab the Plugin version to use.
        id: v3
        run: echo "version=$(cat VERSION_PLUGIN)" >> $GITHUB_OUTPUT

      - name: Grab the timestamp to use.
        id: v4
        run: echo "timestamp=$(cat GITHUB_SHA:0:12)" >> $GITHUB_OUTPUT

      - name: Build the Nagios image.
        uses: docker/build-push-action@v7
        with:
          build-args: |
            NAGIOS_VERSION=${{ steps.v1.outputs.version }}
            NRPE_VERSION=${{ steps.v2.outputs.version }}
            PLUGIN_VERSION=${{ steps.v3.outputs.version }}
          tags: dcjulian29/nagios:${{ steps.v1.outputs.version }}-${{ steps.v4.outputs.timestamp }}

      - name: Build the Nagios Plugins image.
        uses: docker/build-push-action@v7
        with:
          build-args: |
            NAGIOS_VERSION=${{ steps.nagios.v1.version }}-${{ steps.v4.outputs.timestamp }}
          context: plugins/
          tags: dcjulian29/nagios:${{ steps.nagios.v1.version }}-${{ steps.v4.outputs.timestamp }}-plugins

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Login to DockerHub.
        uses: docker/login-action@v4
        with:
          username: dcjulian29
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Grab the Nagios version to use.
        id: v1
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Grab the NRPE version to use.
        id: v2
        run: echo "version=$(cat VERSION_NRPE)" >> $GITHUB_OUTPUT

      - name: Grab the Plugin version to use.
        id: v3
        run: echo "version=$(cat VERSION_PLUGIN)" >> $GITHUB_OUTPUT

      - name: Build the Nagios image.
        uses: docker/build-push-action@v7
        with:
          build-args: |
            NAGIOS_VERSION=${{ steps.v1.outputs.version }}
            NRPE_VERSION=${{ steps.v2.outputs.version }}
            PLUGIN_VERSION=${{ steps.v3.outputs.version }}
          push: true
          tags: dcjulian29/nagios:${{ steps.vars.v1.version }},dcjulian29/nagios:latest

      - name: Build the Nagios Plugin image.
        uses: docker/build-push-action
        with:
          build-args: |
            NAGIOS_VERSION=${{ steps.v1.outputs.version }}
          context: plugins/
          push: true
          tags: dcjulian29/nagios:${{ steps.v1.outputs.version }}-plugins,dcjulian29/nagios:latest-plugins
